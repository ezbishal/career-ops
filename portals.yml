# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.
#   ✅ https://careers.monzo.com   ⚠️ https://job-boards.greenhouse.io/monzo (fallback only)
#   Exception: ATS-hosted careers_url is acceptable when no branded careers page exists.

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Core target roles --
    - "Software Engineer"
    - "Software Developer"
    - ".NET"
    - "C#"
    - "Dotnet"
    - "ASP.NET"
    - "Full Stack"
    - "Full-Stack"
    - "Fullstack"
    # -- Backend roles --
    - "Backend Engineer"
    - "Backend Developer"
    - "API Engineer"
    - "Web Developer"
    # -- Cloud & platform --
    - "Azure"
    - "Cloud Engineer"
    - "Platform Engineer"
    - "Cloud Developer"
    # -- Frontend (secondary) --
    - "React Developer"
    - "TypeScript Engineer"
    # -- Mobile (secondary) --
    - "Mobile Developer"
    - "React Native"
    # -- Broad engineering --
    - "Solutions Engineer"
    - "Integration Engineer"
    - "Systems Engineer"
    - "DevOps Engineer"
    - "Site Reliability"
    - "SRE"
  negative:
    # Exclude junior / intern roles
    - "Junior"
    - "Intern"
    - "Graduate"
    # Exclude stacks irrelevant to profile
    - "Java "
    - "PHP"
    - "Ruby"
    - "Python"
    - "Go "
    - "Golang"
    - "Rust"
    - "Scala"
    - "Kotlin"
    - "Swift"
    - "Objective-C"
    # Exclude hardware / embedded
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Hardware"
    # Exclude blockchain / crypto
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Solidity"
    # Exclude legacy enterprise
    - "COBOL"
    - "Mainframe"
    - "SAP "
    - "Oracle EBS"
    - "Salesforce Admin"
    # Exclude data science / ML / AI specialist
    - "Machine Learning"
    - "Data Scientist"
    - "AI Engineer"
    - "MLOps"
    - "LLM"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.

search_queries:
  # -- Greenhouse — .NET & C# --
  - name: Greenhouse — Senior .NET Engineer UK
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Senior .NET" OR "Senior Software Engineer" ".NET" OR "C#" London OR "United Kingdom" OR remote'
    enabled: true

  - name: Greenhouse — Full Stack TypeScript/React UK
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Full Stack" "React" OR "TypeScript" "Senior" London OR "United Kingdom" OR remote'
    enabled: true

  - name: Greenhouse — Azure Cloud Engineer UK
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Azure" "Cloud Engineer" OR "Platform Engineer" OR "Software Engineer" London OR "United Kingdom" OR remote'
    enabled: true

  # -- Ashby — .NET & Full Stack --
  - name: Ashby — Senior .NET / C# UK
    query: 'site:jobs.ashbyhq.com "Senior" ".NET" OR "C#" OR "ASP.NET" London OR "United Kingdom" OR remote'
    enabled: true

  - name: Ashby — Full Stack Senior UK
    query: 'site:jobs.ashbyhq.com "Full Stack" OR "Full-Stack" "Senior" "React" OR "TypeScript" London OR "United Kingdom" OR remote'
    enabled: true

  # -- Lever — .NET & Backend UK --
  - name: Lever — Senior .NET Engineer UK
    query: 'site:jobs.lever.co "Senior" ".NET" OR "C#" OR "Backend" London OR "United Kingdom" OR remote'
    enabled: true

  - name: Lever — Full Stack Senior UK
    query: 'site:jobs.lever.co "Full Stack" OR "Full-Stack" "Senior" "React" OR "TypeScript" London OR remote'
    enabled: true

  # -- UK-specific job boards --
  - name: Reed — Senior .NET London
    query: 'site:reed.co.uk "Senior .NET Engineer" OR "Senior Software Engineer" ".NET" OR "C#" London OR hybrid'
    enabled: true

  - name: CWJobs — .NET Engineer London
    query: 'site:cwjobs.co.uk ".NET" OR "C#" "Senior" London OR hybrid'
    enabled: true

  - name: Totaljobs — Senior .NET UK
    query: 'site:totaljobs.com "Senior .NET" OR "Senior Software Engineer" "C#" London OR "United Kingdom"'
    enabled: true

  - name: CV-Library — .NET Senior UK
    query: 'site:cv-library.co.uk ".NET" OR "C#" "Senior Engineer" OR "Senior Developer" London OR remote'
    enabled: true

  - name: Technojobs — .NET Senior UK
    query: 'site:technojobs.co.uk ".NET" OR "C#" OR "Azure" "Senior" London OR remote'
    enabled: true

  # -- Remote-friendly boards --
  - name: WeWorkRemotely — .NET / Full Stack
    query: 'site:weworkremotely.com ".NET" OR "C#" OR "Full Stack" "Senior" Europe OR UK'
    enabled: true

  - name: Himalayas — .NET / Azure Senior
    query: 'site:himalayas.app ".NET" OR "C#" OR "Azure" "Senior Software Engineer" Europe OR UK'
    enabled: true

  - name: Remotive — .NET / Full Stack
    query: 'site:remotive.com "Senior" ".NET" OR "C#" OR "Full Stack" "React" Europe'
    enabled: true

  # -- Logistics tech --
  - name: Greenhouse — Logistics Tech Engineer UK
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Software Engineer" OR ".NET" logistics OR "supply chain" OR freight London OR UK OR remote'
    enabled: true

